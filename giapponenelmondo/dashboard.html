<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Giappone nel Mondo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body class="dash-body">

  <div class="dash-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <a href="index.html">
          <span class="logo-jp">日本</span>
          <span class="logo-text">GnM</span>
        </a>
      </div>

      <nav class="sidebar-nav">
        <button class="sidebar-item active" data-panel="feed" onclick="showFeed('all', this)">
          <span class="sidebar-icon">📰</span> Tutte le notizie
        </button>
        <button class="sidebar-item" data-panel="feed" onclick="showFeed('japan', this)">
          <span class="sidebar-icon">🇯🇵</span> Giappone news
        </button>
        <button class="sidebar-item" data-panel="feed" onclick="showFeed('trends', this)">
          <span class="sidebar-icon">📈</span> Trend & cultura
        </button>
        <button class="sidebar-item" data-panel="feed" onclick="showFeed('tech', this)">
          <span class="sidebar-icon">💻</span> Tecnologia
        </button>
        <button class="sidebar-item" data-panel="feed" onclick="showFeed('world', this)">
          <span class="sidebar-icon">🌍</span> Mondo
        </button>
      </nav>

      <div class="sidebar-divider"></div>

      <nav class="sidebar-nav">
        <button class="sidebar-item" data-panel="trend-report" onclick="showPanel('trend-report', this)">
          <span class="sidebar-icon">📊</span> Trend Report
        </button>
        <button class="sidebar-item" data-panel="task-monitor" onclick="showPanel('task-monitor', this)">
          <span class="sidebar-icon">⚙️</span> Task Monitor
        </button>
      </nav>

      <div class="sidebar-section">
        <p class="sidebar-label">Link rapidi</p>
        <div class="quick-links" id="quickLinks">
          <a href="https://youtube.com/studio" target="_blank" rel="noopener" class="quick-link">
            <span>▶</span> YouTube Studio
          </a>
          <a href="https://podcasters.spotify.com" target="_blank" rel="noopener" class="quick-link">
            <span>🎙</span> Spotify for Podcasters
          </a>
          <a href="https://amzn.in/d/0dE9mWbv" target="_blank" rel="noopener" class="quick-link">
            <span>🎵</span> Amazon Music
          </a>
          <a href="https://anchor.fm/s/ffef9fd4/podcast/rss" target="_blank" rel="noopener" class="quick-link">
            <span>📡</span> RSS Feed
          </a>
          <a href="https://analytics.google.com" target="_blank" rel="noopener" class="quick-link">
            <span>📊</span> Analytics
          </a>
          <a href="https://www.japantimes.co.jp" target="_blank" rel="noopener" class="quick-link">
            <span>📰</span> Japan Times
          </a>
          <a href="https://www3.nhk.or.jp/nhkworld/" target="_blank" rel="noopener" class="quick-link">
            <span>📡</span> NHK World
          </a>
        </div>
      </div>

      <div class="sidebar-footer">
        <a href="index.html" class="sidebar-back">← Sito pubblico</a>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="dash-main">

      <header class="dash-header">
        <div>
          <h1 class="dash-title" id="panelTitle">La tua rassegna stampa</h1>
          <p class="dash-subtitle" id="dashDate"></p>
        </div>
        <button class="btn-refresh" id="btnRefresh" onclick="refreshCurrent()" title="Aggiorna">
          <span id="refreshIcon">↻</span> Aggiorna
        </button>
      </header>

      <!-- ── FEED PANEL ── -->
      <div id="panel-feed" class="panel-wrap">
        <div class="loading-state" id="loadingState">
          <div class="spinner"></div>
          <p>Carico le notizie…</p>
        </div>
        <div class="error-state hidden" id="errorState">
          <p>⚠️ Impossibile caricare i feed. Controlla la connessione.</p>
          <button onclick="loadAllFeeds()" class="btn-secondary">Riprova</button>
        </div>
        <div class="feed-grid hidden" id="feedGrid"></div>
      </div>

      <!-- ── TREND REPORT PANEL ── -->
      <div id="panel-trend-report" class="panel-wrap hidden">
        <div class="loading-state" id="trendLoading">
          <div class="spinner"></div>
          <p>Carico il report…</p>
        </div>
        <div class="panel-content hidden" id="trendContent"></div>
      </div>

      <!-- ── TASK MONITOR PANEL ── -->
      <div id="panel-task-monitor" class="panel-wrap hidden">
        <div class="loading-state" id="taskLoading">
          <div class="spinner"></div>
          <p>Carico lo stato…</p>
        </div>
        <div class="panel-content hidden" id="taskContent"></div>
      </div>

    </main>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
