<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Giappone nel Mondo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body class="dash-body">

  <div class="dash-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <a href="index.html">
          <span class="logo-jp">日本</span>
          <span class="logo-text">GnM</span>
        </a>
      </div>

      <nav class="sidebar-nav">
        <button class="sidebar-item active" onclick="showFeed('all')">
          <span class="sidebar-icon">📰</span> Tutte le notizie
        </button>
        <button class="sidebar-item" onclick="showFeed('japan')">
          <span class="sidebar-icon">🇯🇵</span> Giappone news
        </button>
        <button class="sidebar-item" onclick="showFeed('trends')">
          <span class="sidebar-icon">📈</span> Trend & cultura
        </button>
        <button class="sidebar-item" onclick="showFeed('tech')">
          <span class="sidebar-icon">💻</span> Tecnologia
        </button>
        <button class="sidebar-item" onclick="showFeed('world')">
          <span class="sidebar-icon">🌍</span> Mondo
        </button>
      </nav>

      <div class="sidebar-section">
        <p class="sidebar-label">Link rapidi</p>
        <!-- ISTRUZIONI: aggiungi i tuoi link preferiti qui -->
        <div class="quick-links" id="quickLinks">
          <a href="https://youtube.com/studio" target="_blank" rel="noopener" class="quick-link">
            <span>▶</span> YouTube Studio
          </a>
          <a href="https://podcasters.spotify.com" target="_blank" rel="noopener" class="quick-link">
            <span>🎙</span> Spotify for Podcasters
          </a>
          <a href="https://amzn.in/d/0dE9mWbv" target="_blank" rel="noopener" class="quick-link">
            <span>🎵</span> Amazon Music
          </a>
          <a href="https://anchor.fm/s/ffef9fd4/podcast/rss" target="_blank" rel="noopener" class="quick-link">
            <span>📡</span> RSS Feed
          </a>
          <a href="https://analytics.google.com" target="_blank" rel="noopener" class="quick-link">
            <span>📊</span> Analytics
          </a>
          <a href="https://www.japantimes.co.jp" target="_blank" rel="noopener" class="quick-link">
            <span>📰</span> Japan Times
          </a>
          <a href="https://www3.nhk.or.jp/nhkworld/" target="_blank" rel="noopener" class="quick-link">
            <span>📡</span> NHK World
          </a>
        </div>
      </div>

      <div class="sidebar-footer">
        <a href="index.html" class="sidebar-back">← Sito pubblico</a>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="dash-main">

      <header class="dash-header">
        <div>
          <h1 class="dash-title">La tua rassegna stampa</h1>
          <p class="dash-subtitle" id="dashDate"></p>
        </div>
        <button class="btn-refresh" onclick="loadAllFeeds()" title="Aggiorna">
          <span id="refreshIcon">↻</span> Aggiorna
        </button>
      </header>

      <!-- LOADING STATE -->
      <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <p>Carico le notizie…</p>
      </div>

      <!-- ERROR STATE -->
      <div class="error-state hidden" id="errorState">
        <p>⚠️ Impossibile caricare i feed. Controlla la connessione.</p>
        <button onclick="loadAllFeeds()" class="btn-secondary">Riprova</button>
      </div>

      <!-- FEED GRID -->
      <div class="feed-grid hidden" id="feedGrid">
        <!-- Gli articoli vengono iniettati da dashboard.js -->
      </div>

    </main>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
